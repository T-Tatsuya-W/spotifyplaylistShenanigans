<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>CSV Upload & Viewer</title>
	<style>
		body{font-family:Segoe UI,Arial,Helvetica,sans-serif;margin:18px}
		h1{font-size:1.2rem}
		input[type=file]{margin-bottom:12px}
		table{border-collapse:collapse;width:100%;overflow:auto}
		th,td{border:1px solid #ddd;padding:6px 8px;text-align:left;font-family:monospace}
		thead th{background:#f3f3f3}
		.controls{margin:8px 0 16px}
		.raw{white-space:pre-wrap;background:#f9f9f9;padding:8px;border:1px solid #eee;margin-top:12px}
	</style>
</head>
<body>
	<h1>CSV Upload & Viewer</h1>
	<div class="controls">
		<input id="file" type="file" accept=".csv,text/csv" />
		<label><input id="hasHeader" type="checkbox" checked /> First row is header</label>
		<label style="margin-left:8px">Delimiter: <select id="delim"><option value="," selected>, (comma)</option><option value=";">; (semicolon)</option><option value="\t">\t (tab)</option><option value="auto">Auto</option></select></label>
		<label style="margin-left:8px">Encoding: <select id="encoding"><option value="utf-8" selected>utf-8</option><option value="windows-1252">windows-1252</option><option value="iso-8859-1">iso-8859-1</option><option value="auto">Auto detect</option></select></label>
	</div>

	<div id="output"></div>

	<script>
		function parseCSV(text, delim) {
			if (delim === 'auto') {
				const commaCount = (text.match(/,/g)||[]).length;
				const semiCount = (text.match(/;/g)||[]).length;
				const tabCount = (text.match(/\t/g)||[]).length;
				delim = commaCount >= semiCount && commaCount >= tabCount ? ',' : (semiCount >= tabCount ? ';' : '\t');
			}

			const rows = [];
			let cur = '';
			let row = [];
			let inQuotes = false;
			for (let i = 0; i < text.length; i++) {
				const ch = text[i];
				const next = text[i+1];

				if (ch === '"') {
					if (inQuotes && next === '"') { cur += '"'; i++; continue; }
					inQuotes = !inQuotes; continue;
				}

				if (!inQuotes && ch === delim) { row.push(cur); cur = ''; continue; }
				if (!inQuotes && (ch === '\n' || ch === '\r')) {
					if (ch === '\r' && next === '\n') continue; // skip \r when \r\n; will handle on \n
					row.push(cur); cur = ''; rows.push(row); row = []; continue;
				}

				cur += ch;
			}
			// push last
			if (cur !== '' || inQuotes || row.length) row.push(cur);
			if (row.length) rows.push(row);
			return rows;
		}

		function createTable(data, hasHeader) {
			if (!data || !data.length) return '<div>No data</div>';
			const table = document.createElement('table');
			const thead = document.createElement('thead');
			const tbody = document.createElement('tbody');

			const maxCols = Math.max(...data.map(r=>r.length));
			const headerRow = hasHeader ? data[0] : Array.from({length:maxCols},(_,i)=>'Col '+(i+1));

			const trh = document.createElement('tr');
			for (let i=0;i<maxCols;i++) {
				const th = document.createElement('th');
				th.textContent = headerRow[i] !== undefined ? headerRow[i] : '';
				trh.appendChild(th);
			}
			thead.appendChild(trh);
			table.appendChild(thead);

			const start = hasHeader ? 1 : 0;
			for (let r = start; r < data.length; r++) {
				const tr = document.createElement('tr');
				for (let c = 0; c < maxCols; c++) {
					const td = document.createElement('td');
					td.textContent = data[r][c] !== undefined ? data[r][c] : '';
					tr.appendChild(td);
				}
				tbody.appendChild(tr);
			}
			table.appendChild(tbody);
			return table;
		}

		document.getElementById('file').addEventListener('change', async e => {
			const f = e.target.files && e.target.files[0];
			if (!f) return;
			try {
				const ab = await f.arrayBuffer();
				const bytes = new Uint8Array(ab);
				let enc = document.getElementById('encoding').value;
				if (enc === 'auto') {
					if (bytes[0] === 0xEF && bytes[1] === 0xBB && bytes[2] === 0xBF) enc = 'utf-8';
					else if (bytes[0] === 0xFF && bytes[1] === 0xFE) enc = 'utf-16le';
					else if (bytes[0] === 0xFE && bytes[1] === 0xFF) enc = 'utf-16be';
					else enc = 'utf-8';
				}
				const td = new TextDecoder(enc);
				const text = td.decode(ab);
				const delim = document.getElementById('delim').value;
				const data = parseCSV(text, delim);
				const hasHeader = document.getElementById('hasHeader').checked;
				const out = document.getElementById('output');
				out.innerHTML = '';
				const table = createTable(data, hasHeader);
				out.appendChild(table);
				const raw = document.createElement('div'); raw.className='raw'; raw.textContent = text;
				out.appendChild(raw);
			} catch (err) {
				alert('Error reading file: ' + (err && err.message));
			}
		});
	</script>
</body>
</html>
